<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ONYX Music Player</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#070707;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* BACKGROUND */

.bg{
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle,#222,#000);
    filter:blur(120px);
}

/* PLAYER */

.player{
    width:950px;
    height:560px;
    background:#101010;
    border:1px solid #222;
    border-radius:30px;
    display:flex;
    overflow:hidden;
    z-index:2;
}

/* LEFT */

.left{
    width:40%;
    background:#0c0c0c;
    border-right:1px solid #222;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.cover{
    width:260px;
    height:260px;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:25px;
}

.cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.song-title{
    font-size:26px;
    font-weight:bold;
    margin-bottom:8px;
    text-align:center;
}

.artist{
    color:#aaa;
}

/* RIGHT */

.right{
    flex:1;
    padding:25px;
    display:flex;
    flex-direction:column;
}

/* TOP */

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.logo{
    font-size:26px;
    font-weight:bold;
}

.search{
    background:#1a1a1a;
    border:1px solid #333;
    padding:10px 15px;
    border-radius:12px;
    display:flex;
    gap:10px;
    align-items:center;
    width:280px;
}

.search input{
    background:none;
    border:none;
    outline:none;
    color:white;
    width:100%;
}

/* SONGS */

.song-list{
    flex:1;
    overflow-y:auto;
}

.song{
    background:#151515;
    border:1px solid #222;
    padding:12px;
    border-radius:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
    cursor:pointer;
    transition:.2s;
}

.song:hover{
    transform:scale(1.02);
    background:#1c1c1c;
}

.song-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.song-left img{
    width:55px;
    height:55px;
    border-radius:10px;
    object-fit:cover;
}

.song-info h4{
    font-size:15px;
}

.song-info p{
    font-size:13px;
    color:#888;
}

.song button{
    width:40px;
    height:40px;
    border-radius:50%;
    border:none;
    background:white;
    color:black;
}

/* CONTROLS */

.controls{
    margin-top:15px;
    background:#0d0d0d;
    padding:15px;
    border-radius:15px;
    border:1px solid #222;
}

.progress{
    width:100%;
    height:5px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:15px;
}

.progress-bar{
    width:0%;
    height:100%;
    background:white;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
}

.buttons button{
    background:none;
    border:none;
    color:white;
    font-size:20px;
    cursor:pointer;
}

.play-main{
    width:60px;
    height:60px;
    border-radius:50%;
    background:white !important;
    color:black !important;
}

/* MOBILE */

@media(max-width:900px){
    .player{
        flex-direction:column;
        width:95%;
        height:auto;
    }

    .left{
        width:100%;
    }
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="player">

<!-- LEFT -->
<div class="left">

    <div class="cover">
        <img id="mainCover" src="covers/song1.jpg">
    </div>

    <div class="song-title" id="mainTitle">Select a Song</div>
    <div class="artist" id="mainArtist">Artist</div>

</div>

<!-- RIGHT -->
<div class="right">

    <div class="top">
        <div class="logo">ONYX MUSIC</div>

        <div class="search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input id="searchInput" placeholder="Search songs">
        </div>
    </div>

    <div class="song-list">

        <!-- SONG 1 -->
        <div class="song"
        data-title="Song 1"
        data-artist="Artist 1"
        data-cover="covers/song1.jpg"
        data-src="music/song1.mp3">

            <div class="song-left">
                <img src="covers/song1.jpg">
                <div class="song-info">
                    <h4>Song 1</h4>
                    <p>Artist 1</p>
                </div>
            </div>

            <button><i class="fa-solid fa-play"></i></button>

        </div>

        <!-- SONG 2 -->
        <div class="song"
        data-title="Song 2"
        data-artist="Artist 2"
        data-cover="covers/song2.jpg"
        data-src="music/song2.mp3">

            <div class="song-left">
                <img src="covers/song2.jpg">
                <div class="song-info">
                    <h4>Song 2</h4>
                    <p>Artist 2</p>
                </div>
            </div>

            <button><i class="fa-solid fa-play"></i></button>

        </div>

        <!-- I WONDER FIXED -->
        <div class="song"
        data-title="I Wonder"
        data-artist="Kanye West"
        data-cover="https://upload.wikimedia.org/wikipedia/en/7/70/Graduation_%28album%29.jpg"
        data-src="music/iwonder.mp3">

            <div class="song-left">
                <img src="https://upload.wikimedia.org/wikipedia/en/7/70/Graduation_%28album%29.jpg">
                <div class="song-info">
                    <h4>I Wonder</h4>
                    <p>Kanye West</p>
                </div>
            </div>

            <button><i class="fa-solid fa-play"></i></button>

        </div>

    </div>

    <!-- CONTROLS -->

    <div class="controls">

        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="buttons">
            <button><i class="fa-solid fa-backward"></i></button>

            <button class="play-main" id="mainPlay">
                <i class="fa-solid fa-play"></i>
            </button>

            <button><i class="fa-solid fa-forward"></i></button>
        </div>

    </div>

</div>

</div>

<audio id="audio"></audio>

<script>

const songs = document.querySelectorAll(".song");
const audio = document.getElementById("audio");

const title = document.getElementById("mainTitle");
const artist = document.getElementById("mainArtist");
const cover = document.getElementById("mainCover");

const playBtn = document.getElementById("mainPlay");
const progress = document.getElementById("progressBar");

let playing = false;

/* LOAD SONG */
songs.forEach(song => {
    song.onclick = () => {

        audio.src = song.dataset.src;
        title.innerText = song.dataset.title;
        artist.innerText = song.dataset.artist;
        cover.src = song.dataset.cover;

        audio.play();
        playing = true;

        playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
    }
});

/* PLAY/PAUSE */
playBtn.onclick = () => {

    if(!audio.src) return;

    if(playing){
        audio.pause();
        playing = false;
        playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
    } else {
        audio.play();
        playing = true;
        playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
    }
};

/* PROGRESS */
audio.ontimeupdate = () => {
    progress.style.width =
    (audio.currentTime / audio.duration) * 100 + "%";
};

</script>

</body>
</html>
