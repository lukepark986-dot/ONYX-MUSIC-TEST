<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONYX Music Player</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#070707;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.player{
    width:900px;
    height:550px;
    background:#101010;
    border:1px solid #222;
    border-radius:25px;
    display:flex;
    overflow:hidden;
}

/* LEFT */
.left{
    width:40%;
    background:#0c0c0c;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:30px;
    border-right:1px solid #222;
}

.cover{
    width:260px;
    height:260px;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:20px;
}

.cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.song-title{
    font-size:24px;
    font-weight:bold;
}

.artist{
    color:#aaa;
}

/* RIGHT */
.right{
    flex:1;
    padding:25px;
    display:flex;
    flex-direction:column;
}

.logo{
    font-size:26px;
    font-weight:bold;
    margin-bottom:20px;
}

.song{
    background:#151515;
    border:1px solid #222;
    padding:12px;
    border-radius:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
    cursor:pointer;
}

.song:hover{
    background:#1c1c1c;
}

.song-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.song-left img{
    width:55px;
    height:55px;
    border-radius:10px;
}

.song-info h4{
    font-size:15px;
}

.song-info p{
    font-size:13px;
    color:#888;
}

.song button{
    width:40px;
    height:40px;
    border-radius:50%;
    border:none;
    background:white;
    color:black;
}

/* CONTROLS */
.controls{
    margin-top:auto;
    padding-top:20px;
}

.progress{
    width:100%;
    height:5px;
    background:#222;
    border-radius:10px;
    margin-bottom:15px;
}

.progress-bar{
    width:0%;
    height:100%;
    background:white;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
}

.buttons button{
    background:none;
    border:none;
    color:white;
    font-size:20px;
    cursor:pointer;
}

.play{
    width:60px;
    height:60px;
    border-radius:50%;
    background:white !important;
    color:black !important;
}

</style>
</head>

<body>

<div class="player">

<!-- LEFT -->
<div class="left">

    <div class="cover">
        <img id="cover" src="https://upload.wikimedia.org/wikipedia/en/7/70/Graduation_%28album%29.jpg">
    </div>

    <div class="song-title" id="title">Select a Song</div>
    <div class="artist" id="artist">Artist</div>

</div>

<!-- RIGHT -->
<div class="right">

    <div class="logo">ONYX MUSIC</div>

    <!-- SONGS -->

    <div class="song"
    data-title="I Wonder"
    data-artist="Kanye West"
    data-cover="https://upload.wikimedia.org/wikipedia/en/7/70/Graduation_%28album%29.jpg"
    data-src="iwonder.mp3">

        <div class="song-left">
            <img src="https://upload.wikimedia.org/wikipedia/en/7/70/Graduation_%28album%29.jpg">
            <div class="song-info">
                <h4>I Wonder</h4>
                <p>Kanye West</p>
            </div>
        </div>

        <button><i class="fa-solid fa-play"></i></button>
    </div>

    <!-- CONTROLS -->

    <div class="controls">

        <div class="progress">
            <div class="progress-bar" id="bar"></div>
        </div>

        <div class="buttons">
            <button><i class="fa-solid fa-backward"></i></button>

            <button class="play" id="playBtn">
                <i class="fa-solid fa-play"></i>
            </button>

            <button><i class="fa-solid fa-forward"></i></button>
        </div>

    </div>

</div>

</div>

<audio id="audio"></audio>

<script>

const song = document.querySelector(".song");
const audio = document.getElementById("audio");

const title = document.getElementById("title");
const artist = document.getElementById("artist");
const cover = document.getElementById("cover");

const playBtn = document.getElementById("playBtn");
const bar = document.getElementById("bar");

let playing = false;

/* LOAD SONG */
song.onclick = () => {

    audio.src = song.dataset.src; // 👈 FIXED (iwonder.mp3 in ROOT)
    title.innerText = song.dataset.title;
    artist.innerText = song.dataset.artist;
    cover.src = song.dataset.cover;

    audio.play();
    playing = true;

    playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
};

/* PLAY / PAUSE */
playBtn.onclick = () => {

    if(!audio.src) return;

    if(playing){
        audio.pause();
        playing = false;
        playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
    } else {
        audio.play();
        playing = true;
        playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
    }

};

/* PROGRESS */
audio.ontimeupdate = () => {
    bar.style.width =
    (audio.currentTime / audio.duration) * 100 + "%";
};

</script>

</body>
</html>
